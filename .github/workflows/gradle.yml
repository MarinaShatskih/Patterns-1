name: Java CI with Gradle

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # Обновил до актуальной версии v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4 # Обновил до актуальной версии v4
        with:
          java-version: '11'
          distribution: 'adopt'
          cache: 'gradle' # Ускорит последующие сборки

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start SUT
        # Запускаем приложение в фоновом режиме
        run: java -jar ./artifacts/app-replan-delivery.jar &

      - name: Wait for SUT to be ready
        # Ждем до 60 секунд, пока порт 9999 начнет отвечать
        run: |
          echo "Waiting for application to start on port 9999..."
          timeout 60s bash -c 'until curl -s http://localhost:9999; do sleep 5; done'
          echo "Application is UP and running!"

      - name: Build and run tests
        # Запуск тестов в безголовом режиме с подробным логом
        run: ./gradlew test -Dselenide.headless=true --info

      - name: Upload Test Report
        # Сохраняем отчет, если тесты упадут, чтобы можно было скачать его в Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
